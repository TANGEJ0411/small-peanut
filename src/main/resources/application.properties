spring.datasource.url=jdbc:mysql://localhost:3306/small_peanut?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8080

spring.jackson.serialization.write-dates-as-timestamps=false

line.bot.channel-token=${LINE_CHANNEL_ACCESS_TOKEN:}
line.bot.channel-secret=${LINE_CHANNEL_SECRET:}
